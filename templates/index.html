<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 주식 심층 분석 — CANSLIM + 퀀트 알파</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --blue: #58a6ff;
  --orange: #ffa657;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  line-height: 1.6;
}

/* ── Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1.25rem 2rem;
  text-align: center;
}
.header h1 { font-size: 1.6rem; font-weight: 700; }
.header p  { color: var(--muted); font-size: 0.85rem; margin-top: 0.2rem; }

/* ── Layout */
.container { max-width: 980px; margin: 0 auto; padding: 2rem 1rem 4rem; }

/* ── Form */
.form-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.75rem 2rem;
  margin-bottom: 1.5rem;
}
.form-row { display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap; }
.form-group { flex: 1; min-width: 180px; }
.form-group label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 0.4rem; font-weight: 500; }
.form-group input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 0.7rem 1rem;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus { border-color: var(--blue); }
.form-group input::placeholder { color: var(--muted); }

.btn {
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 0.7rem 1.75rem;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn:hover { opacity: 0.82; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

.chips { margin-top: 0.9rem; display: flex; flex-wrap: wrap; gap: 0.4rem; }
.chip {
  font-size: 0.78rem;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 0.2rem 0.65rem;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.chip:hover { border-color: var(--blue); color: var(--blue); }

/* ── Autocomplete */
.ac-wrap { position: relative; }
.ac-list {
  display: none;
  position: absolute;
  top: calc(100% - 1px);
  left: 0; right: 0;
  z-index: 200;
  background: var(--surface);
  border: 1px solid var(--blue);
  border-top: none;
  border-radius: 0 0 8px 8px;
  overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.ac-item {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.65rem 1rem;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.active { background: var(--surface2); }
.ac-sym  { font-weight: 700; color: var(--blue); font-size: 0.85rem; flex-shrink: 0; min-width: 80px; }
.ac-name { font-size: 0.85rem; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ac-exch { font-size: 0.72rem; color: var(--muted); flex-shrink: 0; }
.ac-loading { padding: 0.75rem 1rem; font-size: 0.83rem; color: var(--muted); }
.selected-tag { display: none; margin-top: 0.45rem; font-size: 0.8rem; color: var(--muted); }
.selected-tag span { color: var(--green); font-weight: 600; }

/* ── Alerts */
.err-box {
  display: none;
  background: rgba(248,81,73,0.1);
  border: 1px solid var(--red);
  border-radius: 8px;
  padding: 0.85rem 1.25rem;
  color: var(--red);
  margin-bottom: 1.25rem;
  font-size: 0.9rem;
}

/* ── Loading */
.loading-box { display: none; text-align: center; padding: 3rem; }
.spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
  margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-box p { color: var(--muted); font-size: 0.9rem; }

/* ── Results wrapper */
#results { display: none; }

/* ── Stock header bar */
.stock-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem 1.75rem;
  margin-bottom: 1.25rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
}
.stock-name { font-size: 1.3rem; font-weight: 700; }
.stock-ticker { color: var(--blue); font-size: 0.95rem; margin-left: 0.5rem; font-weight: 400; }
.stock-meta { color: var(--muted); font-size: 0.8rem; margin-top: 0.2rem; }
.stock-price { font-size: 2rem; font-weight: 700; font-family: 'Courier New', monospace; text-align: right; }

/* ── Signal banner */
.signal-banner {
  border-radius: 12px;
  padding: 1.5rem 2rem;
  text-align: center;
  margin-bottom: 1.25rem;
}
.signal-banner.buy  { background: rgba(63,185,80,0.12); border: 2px solid var(--green); }
.signal-banner.sell { background: rgba(248,81,73,0.12); border: 2px solid var(--red); }
.signal-banner.hold { background: rgba(210,153,34,0.12); border: 2px solid var(--yellow); }
.signal-banner.buy  .sig-text { color: var(--green); }
.signal-banner.sell .sig-text { color: var(--red); }
.signal-banner.hold .sig-text { color: var(--yellow); }
.sig-text { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.35rem; }
.sig-action { font-size: 0.95rem; opacity: 0.85; }

/* ── Grid */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
@media (max-width: 620px) { .g2 { grid-template-columns: 1fr; } }

/* ── Card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.4rem 1.6rem;
  margin-bottom: 1.25rem;
}
.card-title {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 1rem;
}

/* ── Score */
.score-wrap { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
.score-ring {
  width: 90px; height: 90px;
  border-radius: 50%;
  border: 4px solid;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  flex-shrink: 0;
}
.score-num { font-size: 1.8rem; font-weight: 700; font-family: 'Courier New', monospace; line-height: 1; }
.score-sub { font-size: 0.65rem; color: var(--muted); margin-top: 0.1rem; }
.score-bars { flex: 1; min-width: 200px; }
.bar-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.55rem; }
.bar-label { font-size: 0.76rem; color: var(--muted); width: 105px; flex-shrink: 0; text-align: right; }
.bar-track { flex: 1; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.bar-fill  { height: 100%; border-radius: 3px; background: var(--green); }
.bar-val   { font-size: 0.72rem; color: var(--muted); width: 36px; text-align: right; flex-shrink: 0; font-family: 'Courier New', monospace; }

/* ── Info rows */
.irow { display: flex; justify-content: space-between; align-items: flex-start; padding: 0.55rem 0; border-bottom: 1px solid var(--border); gap: 1rem; }
.irow:last-child { border-bottom: none; }
.ik { color: var(--muted); font-size: 0.84rem; flex-shrink: 0; }
.iv { font-size: 0.84rem; font-weight: 500; text-align: right; }

/* ── Section sub-title */
.sub { font-size: 0.76rem; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.06em; margin: 1.1rem 0 0.5rem; }
.sub:first-child { margin-top: 0; }

/* ── CANSLIM grid */
.can-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; margin-top: 0.5rem; }
@media (max-width: 480px) { .can-grid { grid-template-columns: repeat(4, 1fr); } }
.can-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.65rem 0.4rem;
  text-align: center;
  transition: border-color 0.2s;
}
.can-item.pass { border-color: var(--green); }
.can-letter { font-size: 1.1rem; font-weight: 700; }
.can-check  { font-size: 0.85rem; margin-top: 0.15rem; }

/* ── Trade grid */
.trade-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 0.9rem; }
.trade-item { background: var(--surface2); border-radius: 8px; padding: 0.9rem 1rem; }
.tl { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.25rem; }
.tv { font-size: 1.15rem; font-weight: 700; font-family: 'Courier New', monospace; }
.tp { font-size: 0.75rem; margin-top: 0.1rem; color: var(--muted); }

/* ── Whale signals */
.whale-sig { background: var(--surface2); border-radius: 6px; padding: 0.55rem 0.8rem; margin-bottom: 0.45rem; font-size: 0.85rem; }

/* ── Insight */
.insight-text {
  font-size: 1rem;
  line-height: 1.75;
  border-left: 3px solid var(--blue);
  padding-left: 1rem;
  color: var(--text);
}

/* ── Rules */
.rule { display: flex; gap: 0.6rem; padding: 0.55rem 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
.rule:last-child { border-bottom: none; }
.rn { color: var(--blue); font-weight: 700; flex-shrink: 0; }

/* ── Badge */
.badge { display: inline-block; padding: 0.18rem 0.55rem; border-radius: 20px; font-size: 0.76rem; font-weight: 600; }
.bg-green  { background: rgba(63,185,80,0.18);  color: var(--green); }
.bg-red    { background: rgba(248,81,73,0.18);  color: var(--red); }
.bg-yellow { background: rgba(210,153,34,0.18); color: var(--yellow); }
.bg-blue   { background: rgba(88,166,255,0.18); color: var(--blue); }

/* ── Colors */
.c-green  { color: var(--green); }
.c-red    { color: var(--red); }
.c-yellow { color: var(--yellow); }
.c-blue   { color: var(--blue); }
.c-muted  { color: var(--muted); }

/* ── Disclaimer */
.disclaimer { text-align: center; color: var(--muted); font-size: 0.78rem; padding: 1.5rem 0; }
/* ── Scanner ── */
.scanner-filters { display:flex; gap:0.75rem; flex-wrap:wrap; align-items:flex-end; margin-bottom:1rem; }
.sf-group { display:flex; flex-direction:column; gap:0.3rem; }
.sf-group label { font-size:0.78rem; color:var(--muted); font-weight:500; }
.sf-group select, .sf-group input[type=number] {
  background:var(--bg); border:1px solid var(--border); border-radius:8px;
  color:var(--text); padding:0.55rem 0.75rem; font-size:0.9rem; outline:none;
  transition:border-color 0.2s; min-width:110px;
}
.sf-group select:focus, .sf-group input:focus { border-color:var(--blue); }
.scan-progress { display:none; text-align:center; padding:2rem; }
.scan-spinner { width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.75s linear infinite;margin:0 auto 0.75rem; }
.scan-table-wrap { overflow-x:auto; }
.scan-table { width:100%; border-collapse:collapse; font-size:0.83rem; }
.scan-table th { text-align:left; padding:0.55rem 0.75rem; color:var(--muted); font-size:0.73rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; border-bottom:1px solid var(--border); white-space:nowrap; cursor:pointer; user-select:none; }
.scan-table th:hover { color:var(--blue); }
.scan-table th .si { margin-left:0.25rem; opacity:0.35; }
.scan-table th.sorted .si { opacity:1; color:var(--blue); }
.scan-table td { padding:0.55rem 0.75rem; border-bottom:1px solid var(--border); white-space:nowrap; vertical-align:middle; }
.scan-table tr:last-child td { border-bottom:none; }
.scan-table tbody tr { cursor:pointer; transition:background 0.1s; }
.scan-table tbody tr:hover { background:var(--surface2); }
.st-ticker { font-size:0.75rem; color:var(--blue); margin-left:0.3rem; }
.st-sector { font-size:0.73rem; color:var(--muted); display:block; }
.score-pill { display:inline-block; padding:0.15rem 0.55rem; border-radius:20px; font-weight:700; font-size:0.8rem; }
.scan-empty { text-align:center; padding:2rem; color:var(--muted); font-size:0.9rem; }

/* ── Chart ── */
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.4rem 1.6rem; margin-bottom: 1.25rem; }
.chart-periods { display: flex; gap: 0.4rem; margin-bottom: 0.9rem; }
.cp-btn { font-size: 0.76rem; padding: 0.2rem 0.6rem; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all 0.15s; }
.cp-btn:hover, .cp-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(88,166,255,0.1); }
.chart-legend { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.6rem; font-size: 0.75rem; }
.leg-item { display: flex; align-items: center; gap: 0.35rem; }
.leg-dot { width: 20px; height: 2px; border-radius: 2px; }
#chart-container { width: 100%; }
</style>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<header class="header">
  <h1>📊 주식 심층 분석 프로그램</h1>
  <p>CANSLIM + 퀀트 알파 프로토콜 (6단계)</p>
</header>

<div class="container">

  <!-- Form -->
  <div class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label>종목 검색</label>
        <div class="ac-wrap">
          <input id="inp-ticker" type="text" placeholder="종목명 또는 티커 입력 (예: Apple, AAPL, 삼성)"
                 autocomplete="off" autocorrect="off" spellcheck="false">
          <div class="ac-list" id="ac-list"></div>
          <div class="selected-tag" id="selected-tag">선택됨: <span id="selected-name"></span></div>
        </div>
      </div>
      <div class="form-group" style="max-width:210px">
        <label>투자 자본금</label>
        <input id="inp-capital" type="number" value="10000000" min="100000" step="1000000">
      </div>
      <button class="btn" id="btn-go" onclick="doAnalyze()">분석하기 →</button>
    </div>
    <div class="chips">
      <span class="chip" onclick="pick('AAPL')">AAPL</span>
      <span class="chip" onclick="pick('TSLA')">TSLA</span>
      <span class="chip" onclick="pick('NVDA')">NVDA</span>
      <span class="chip" onclick="pick('MSFT')">MSFT</span>
      <span class="chip" onclick="pick('AMZN')">AMZN</span>
      <span class="chip" onclick="pick('005930.KS')">삼성전자</span>
      <span class="chip" onclick="pick('000660.KS')">SK하이닉스</span>
      <span class="chip" onclick="pick('035420.KS')">NAVER</span>
      <span class="chip" onclick="pick('035720.KS')">카카오</span>
    </div>
  </div>

  <!-- Scanner -->
  <div class="form-card" style="margin-bottom:1.5rem">
    <div style="font-size:0.85rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:1rem">🔍 종목 스캐너</div>
    <div class="scanner-filters">
      <div class="sf-group">
        <label>시장</label>
        <select id="sc-market">
          <option value="all">전체 (미국+한국)</option>
          <option value="us">미국</option>
          <option value="kr">한국</option>
        </select>
      </div>
      <div class="sf-group">
        <label>신호</label>
        <select id="sc-signal">
          <option value="all">전체</option>
          <option value="buy">매수만</option>
          <option value="hold">관망만</option>
          <option value="sell">매도만</option>
        </select>
      </div>
      <div class="sf-group">
        <label>200일선</label>
        <select id="sc-200">
          <option value="all">전체</option>
          <option value="yes">위만</option>
          <option value="no">아래만</option>
        </select>
      </div>
      <div class="sf-group">
        <label>최소 점수</label>
        <input id="sc-minscore" type="number" value="0" min="0" max="100" step="5" style="width:90px">
      </div>
      <button class="btn" id="btn-scan" onclick="doScan()">스캔 시작 →</button>
    </div>
    <div class="scan-progress" id="sc-loading">
      <div class="scan-spinner"></div>
      <div style="color:var(--muted);font-size:0.85rem">종목 분석 중… 잠시 기다려주세요 (30~60초)</div>
    </div>
    <div id="sc-results"></div>
  </div>

  <div class="err-box" id="err-box"></div>
  <div class="loading-box" id="loading-box">
    <div class="spinner"></div>
    <p>시장 데이터 수집 및 분석 중…</p>
  </div>

  <div id="results"></div>

</div>

<script>
function pick(t) {
  document.getElementById('inp-ticker').value = t;
  document.getElementById('selected-tag').style.display = 'none';
  document.getElementById('inp-ticker').focus();
}

/* ── Autocomplete ── */
let acTimer = null;
let acItems = [];
let acIdx = -1;

const acInput = document.getElementById('inp-ticker');
const acList  = document.getElementById('ac-list');

function acHide() {
  acList.style.display = 'none';
  acItems = [];
  acIdx = -1;
}

function acRender(results) {
  if (!results.length) { acHide(); return; }
  acItems = results.filter(r => r.symbol !== '__HINT__' && r.symbol !== '__PRIVATE__');
  acIdx = -1;
  acList.innerHTML = results.map((r, i) => {
    if (r.symbol === '__HINT__') {
      return `<div class="ac-loading" style="color:var(--yellow)">${esc(r.name)}</div>`;
    }
    if (r.symbol === '__PRIVATE__') {
      return `<div class="ac-loading" style="color:var(--orange)">🔒 ${esc(r.name)}</div>`;
    }
    const realIdx = acItems.indexOf(r);
    return `<div class="ac-item" data-i="${realIdx}">
      <span class="ac-sym">${esc(r.symbol)}</span>
      <span class="ac-name">${esc(r.name)}</span>
      <span class="ac-exch">${esc(r.exchange)}${r.type ? ' · ' + esc(r.type) : ''}</span>
    </div>`;
  }).join('');
  acList.style.display = 'block';
  acList.querySelectorAll('.ac-item').forEach(el => {
    el.addEventListener('mousedown', ev => {
      ev.preventDefault();
      acSelect(parseInt(el.dataset.i));
    });
  });
}

function acSelect(i) {
  const r = acItems[i];
  if (!r) return;
  acInput.value = r.symbol;
  document.getElementById('selected-name').textContent = r.name;
  document.getElementById('selected-tag').style.display = 'block';
  acHide();
}

function acHighlight(newIdx) {
  const els = acList.querySelectorAll('.ac-item');
  els.forEach(el => el.classList.remove('active'));
  if (newIdx >= 0 && newIdx < els.length) {
    els[newIdx].classList.add('active');
    acIdx = newIdx;
  } else {
    acIdx = -1;
  }
}

acInput.addEventListener('input', () => {
  const q = acInput.value.trim();
  document.getElementById('selected-tag').style.display = 'none';
  clearTimeout(acTimer);
  if (q.length < 1) { acHide(); return; }
  acList.innerHTML = '<div class="ac-loading">검색 중…</div>';
  acList.style.display = 'block';
  acTimer = setTimeout(async () => {
    try {
      const res = await fetch('/search?q=' + encodeURIComponent(q));
      const data = await res.json();
      acRender(data);
    } catch { acHide(); }
  }, 280);
});

acInput.addEventListener('keydown', e => {
  if (acList.style.display === 'block' && acItems.length) {
    if (e.key === 'ArrowDown') { e.preventDefault(); acHighlight(Math.min(acIdx + 1, acItems.length - 1)); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); acHighlight(Math.max(acIdx - 1, 0)); return; }
    if (e.key === 'Enter' && acIdx >= 0) { e.preventDefault(); acSelect(acIdx); return; }
    if (e.key === 'Escape') { acHide(); return; }
  }
  if (e.key === 'Enter') doAnalyze();
});

document.addEventListener('click', e => {
  if (!acInput.contains(e.target) && !acList.contains(e.target)) acHide();
});

/* ── helpers ── */
function fmt(v, d = 2) {
  if (v == null) return 'N/A';
  return Number(v).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
}
function pct(base, v) {
  const p = (v - base) / base * 100;
  return `(${p >= 0 ? '+' : ''}${p.toFixed(1)}%)`;
}
function scoreColor(s) {
  return s >= 80 ? 'var(--green)' : s >= 60 ? 'var(--yellow)' : 'var(--red)';
}
function sigClass(sig) {
  if (sig.includes('매수')) return 'buy';
  if (sig.includes('매도')) return 'sell';
  return 'hold';
}
function alertBadge(a) {
  if (a.includes('🟢')) return 'bg-green';
  if (a.includes('🟡')) return 'bg-yellow';
  return 'bg-red';
}
function e(s) { /* safe text node */ return document.createTextNode(s); }
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ── Scanner ── */
let _scanData = [];
let _sortCol  = 'score';
let _sortAsc  = false;

async function doScan() {
  const btn = document.getElementById('btn-scan');
  btn.disabled = true;
  document.getElementById('sc-loading').style.display = 'block';
  document.getElementById('sc-results').innerHTML = '';

  try {
    const res = await fetch('/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        market:    document.getElementById('sc-market').value,
        signal:    document.getElementById('sc-signal').value,
        above_200: document.getElementById('sc-200').value,
        min_score: parseInt(document.getElementById('sc-minscore').value) || 0,
        capital:   parseFloat(document.getElementById('inp-capital').value) || 10_000_000,
      }),
    });
    _scanData = await res.json();
    renderScanTable(_sortCol, _sortAsc);
  } catch (e) {
    document.getElementById('sc-results').innerHTML = `<div class="scan-empty">❌ 스캔 중 오류가 발생했습니다.</div>`;
  } finally {
    document.getElementById('sc-loading').style.display = 'none';
    btn.disabled = false;
  }
}

function renderScanTable(col, asc) {
  _sortCol = col; _sortAsc = asc;
  const el = document.getElementById('sc-results');
  if (!_scanData.length) { el.innerHTML = '<div class="scan-empty">조건에 맞는 종목이 없습니다.</div>'; return; }

  const sorted = [..._scanData].sort((a, b) => {
    let av = a[col], bv = b[col];
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    return asc ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
  });

  const cols = [
    { key:'name',      label:'종목' },
    { key:'score',     label:'점수' },
    { key:'signal',    label:'신호' },
    { key:'cur',       label:'현재가' },
    { key:'rsi',       label:'RSI' },
    { key:'above_200', label:'200일선' },
    { key:'vol_ratio', label:'거래량%' },
    { key:'macd_st',   label:'MACD' },
  ];

  const thead = cols.map(c => {
    const active = c.key === col ? 'sorted' : '';
    const arrow  = c.key === col ? (asc ? '▲' : '▼') : '▾';
    return `<th class="${active}" onclick="renderScanTable('${c.key}', ${c.key===col?!asc:false})">${c.label}<span class="si">${arrow}</span></th>`;
  }).join('');

  const tbody = sorted.map(r => {
    const sc = r.score;
    const pillColor = sc >= 80 ? 'rgba(63,185,80,0.18);color:var(--green)' : sc >= 60 ? 'rgba(210,153,34,0.18);color:var(--yellow)' : 'rgba(248,81,73,0.18);color:var(--red)';
    const sigColor  = r.signal.includes('매수') ? 'var(--green)' : r.signal.includes('매도') ? 'var(--red)' : 'var(--yellow)';
    const a200 = r.above_200 ? '<span class="c-green">위 ✅</span>' : '<span class="c-red">아래 ⛔</span>';
    const macdShort = r.macd_st.includes('골든') ? '<span class="c-green">골든✅</span>' : r.macd_st.includes('데드') ? '<span class="c-red">데드⛔</span>' : r.macd_st;
    return `<tr onclick="scanPick('${esc(r.ticker)}')">
      <td><span style="font-weight:600">${esc(r.name)}</span><span class="st-ticker">${esc(r.ticker)}</span><span class="st-sector">${esc(r.sector)}</span></td>
      <td><span class="score-pill" style="background:${pillColor}">${sc}</span></td>
      <td style="color:${sigColor};font-weight:600">${esc(r.signal)}</td>
      <td>${r.cur.toLocaleString()} <span style="font-size:0.7rem;color:var(--muted)">${esc(r.currency)}</span></td>
      <td class="${r.rsi>=50&&r.rsi<=70?'c-green':r.rsi>70?'c-yellow':'c-red'}">${r.rsi}</td>
      <td>${a200}</td>
      <td class="${r.vol_ratio>=150?'c-green':r.vol_ratio<80?'c-red':''}">${r.vol_ratio}%</td>
      <td>${macdShort}</td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.6rem">총 ${sorted.length}개 종목 · 행 클릭 시 상세 분석</div>
    <div class="scan-table-wrap">
      <table class="scan-table">
        <thead><tr>${thead}</tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`;
}

function scanPick(ticker) {
  acInput.value = ticker;
  document.getElementById('selected-tag').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(doAnalyze, 300);
}

/* ── Chart ── */
let _chart = null, _chartRsi = null, _chartMacd = null;
let _ohlcv = [];
let _syncing = false;

function makeChart(elId, height, extraOpts = {}) {
  const el = document.getElementById(elId);
  const base = {
    width: el.clientWidth, height,
    layout: { background: { color: '#161b22' }, textColor: '#8b949e' },
    grid:   { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#30363d' },
    timeScale: { borderColor: '#30363d', timeVisible: true },
    handleScroll: true, handleScale: true,
  };
  return LightweightCharts.createChart(el, { ...base, ...extraOpts });
}

function syncCharts(charts) {
  charts.forEach((src, i) => {
    src.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (_syncing || !range) return;
      _syncing = true;
      charts.forEach((tgt, j) => { if (i !== j) tgt.timeScale().setVisibleLogicalRange(range); });
      _syncing = false;
    });
  });
}

function renderChart(chartData) {
  const { ohlcv, sma10, sma20, sma50, sma200, rsi, macd_line, macd_signal, macd_hist } = chartData;
  _ohlcv = ohlcv;

  [_chart, _chartRsi, _chartMacd].forEach(c => { if (c) c.remove(); });

  /* ── 메인 캔들 차트 ── */
  _chart = makeChart('chart-main', 300, {
    rightPriceScale: { borderColor: '#30363d', scaleMargins: { top: 0.06, bottom: 0.22 } },
    timeScale: { borderColor: '#30363d', timeVisible: true, visible: false },
  });
  const candle = _chart.addCandlestickSeries({
    upColor: '#3fb950', downColor: '#f85149',
    borderUpColor: '#3fb950', borderDownColor: '#f85149',
    wickUpColor: '#3fb950', wickDownColor: '#f85149',
  });
  candle.setData(ohlcv);
  const volS = _chart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'vol' });
  _chart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
  volS.setData(ohlcv.map(d => ({
    time: d.time, value: d.volume,
    color: d.close >= d.open ? 'rgba(63,185,80,0.32)' : 'rgba(248,81,73,0.32)',
  })));
  [
    { data: sma10,  color: '#ffa657', width: 1 },
    { data: sma20,  color: '#58a6ff', width: 1 },
    { data: sma50,  color: '#d29922', width: 1.5 },
    { data: sma200, color: '#ff7b72', width: 2 },
  ].forEach(({ data, color, width }) => {
    const s = _chart.addLineSeries({ color, lineWidth: width, lastValueVisible: false, priceLineVisible: false });
    s.setData(data);
  });

  /* ── RSI 차트 ── */
  _chartRsi = makeChart('chart-rsi', 100, {
    rightPriceScale: { borderColor: '#30363d', scaleMargins: { top: 0.1, bottom: 0.1 }, autoScale: false, minValue: 0, maxValue: 100 },
    timeScale: { borderColor: '#30363d', timeVisible: true, visible: false },
  });
  const rsiS = _chartRsi.addLineSeries({ color: '#c778dd', lineWidth: 1.5, lastValueVisible: true, priceLineVisible: false });
  rsiS.setData(rsi);
  rsiS.applyOptions({ autoscaleInfoProvider: () => ({ priceRange: { minValue: 0, maxValue: 100 } }) });
  [{ p: 70, color: '#d29922' }, { p: 50, color: '#30363d' }, { p: 30, color: '#58a6ff' }].forEach(({ p, color }) => {
    rsiS.createPriceLine({ price: p, color, lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true });
  });

  /* ── MACD 차트 ── */
  _chartMacd = makeChart('chart-macd', 110, {
    rightPriceScale: { borderColor: '#30363d', scaleMargins: { top: 0.1, bottom: 0.1 } },
    timeScale: { borderColor: '#30363d', timeVisible: true },
  });
  const histS = _chartMacd.addHistogramSeries({ priceFormat: { minMove: 0.0001 }, lastValueVisible: false, priceLineVisible: false });
  histS.setData(macd_hist);
  const macdS = _chartMacd.addLineSeries({ color: '#58a6ff', lineWidth: 1.5, lastValueVisible: true, priceLineVisible: false });
  macdS.setData(macd_line);
  const sigS = _chartMacd.addLineSeries({ color: '#ffa657', lineWidth: 1, lastValueVisible: true, priceLineVisible: false });
  sigS.setData(macd_signal);

  /* ── 동기화 & 리사이즈 ── */
  syncCharts([_chart, _chartRsi, _chartMacd]);
  const ro = new ResizeObserver(() => {
    const w = document.getElementById('chart-main').clientWidth;
    [{ c: _chart, id: 'chart-main' }, { c: _chartRsi, id: 'chart-rsi' }, { c: _chartMacd, id: 'chart-macd' }]
      .forEach(({ c }) => { if (c) c.applyOptions({ width: w }); });
  });
  ro.observe(document.getElementById('chart-container'));
}

function setChartRange(days) {
  document.querySelectorAll('.cp-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (!_chart || !_ohlcv.length) return;
  const last = _ohlcv[_ohlcv.length - 1].time;
  const dt = new Date(last);
  dt.setDate(dt.getDate() - days);
  _chart.timeScale().setVisibleRange({ from: dt.toISOString().slice(0, 10), to: last });
}

/* ── main ── */
async function doAnalyze() {
  let ticker = acInput.value.trim();
  const capital = parseFloat(document.getElementById('inp-capital').value) || 10_000_000;

  if (!ticker) { acInput.focus(); return; }

  /* 드롭다운에 결과가 있으면 선택된 항목(없으면 첫 번째) 자동 사용 */
  if (acItems.length) {
    const item = acIdx >= 0 ? acItems[acIdx] : acItems[0];
    ticker = item.symbol;
    acInput.value = ticker;
    document.getElementById('selected-name').textContent = item.name;
    document.getElementById('selected-tag').style.display = 'block';
    acHide();
  }

  /* 드롭다운이 닫혀 있고 입력값이 티커 형식이 아니면(한글·공백 포함) 검색 후 첫 결과 자동 선택 */
  if (!/^[A-Za-z0-9.\-\^]+$/.test(ticker)) {
    try {
      const res = await fetch('/search?q=' + encodeURIComponent(ticker));
      const data = await res.json();
      if (data.length) {
        ticker = data[0].symbol;
        acInput.value = ticker;
        document.getElementById('selected-name').textContent = data[0].name;
        document.getElementById('selected-tag').style.display = 'block';
      } else {
        const eb = document.getElementById('err-box');
        eb.textContent = `❌ '${ticker}'에 해당하는 종목을 찾을 수 없습니다.`;
        eb.style.display = 'block';
        return;
      }
    } catch {
      /* 검색 실패 시 그대로 진행 */
    }
  }

  document.getElementById('err-box').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('loading-box').style.display = 'block';
  document.getElementById('btn-go').disabled = true;

  try {
    const res  = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker, capital })
    });
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || '분석 중 오류 발생');
    render(data);
    if (data.chart) renderChart(data.chart);

  } catch (err) {
    const eb = document.getElementById('err-box');
    eb.textContent = '❌ ' + err.message;
    eb.style.display = 'block';
  } finally {
    document.getElementById('loading-box').style.display = 'none';
    document.getElementById('btn-go').disabled = false;
  }
}
</script>
